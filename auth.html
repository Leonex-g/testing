<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --muted: #7a7880;
      --accent: #c9a96e;
      --accent-soft: rgba(201,169,110,0.12);
      --glow: rgba(201,169,110,0.18);
      --red: #e05c5c;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(100,80,180,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 44px 44px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px var(--glow);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Decorative top line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 50%;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #a07840);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; fill: #0a0a0f; }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 8px;
      animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.5;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Google button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
      animation: fadeUp 0.7s 0.25s cubic-bezier(0.22,1,0.36,1) both;
      position: relative;
      overflow: hidden;
    }

    .btn-google::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .btn-google:hover::after { opacity: 1; }
    .btn-google:active { transform: translateY(0); }

    .btn-google.loading { pointer-events: none; opacity: 0.6; }

    .google-icon {
      width: 18px; height: 18px; flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .divider span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Email field */
    .field {
      margin-bottom: 16px;
      animation: fadeUp 0.7s 0.32s cubic-bezier(0.22,1,0.36,1) both;
    }

    .field label {
      display: block;
      font-size: 11.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: rgba(255,255,255,0.2); }

    .field input:focus {
      border-color: rgba(201,169,110,0.4);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
    }

    .field2 { animation-delay: 0.36s; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
      letter-spacing: 0.02em;
      animation: fadeUp 0.7s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-submit:hover {
      opacity: 0.88;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,169,110,0.25);
    }

    .btn-submit:active { transform: translateY(0); }

    /* Error / success banners */
    .banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    .banner.error  { display: flex; background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.25); color: #e8a0a0; }
    .banner.success { display: flex; background: rgba(100,200,120,0.1); border: 1px solid rgba(100,200,120,0.25); color: #90d4a0; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 28px;
      line-height: 1.6;
      animation: fadeUp 0.7s 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* Success screen */
    #success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 16px 0;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      margin-bottom: 20px;
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--accent-soft);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    #success-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 6px;
    }

    #success-email {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .btn-signout {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-signout:hover { border-color: var(--red); color: var(--red); }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">

  <!-- Auth Form -->
  <div id="auth-form">

    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-name">YourApp</span>
    </div>

    <h1>Welcome <em>back</em></h1>
    <p class="subtitle">Sign in to continue to your workspace.</p>

    <!-- Error banner -->
    <div class="banner" id="error-banner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">Something went wrong.</span>
    </div>

    <!-- Google Sign-In -->
    <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Continue with Google</span>
      <div class="spinner" id="google-spinner"></div>
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field field2">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') signInWithEmail()"/>
    </div>

    <button class="btn-submit" onclick="signInWithEmail()">Sign In</button>

    <p class="footer-note">
      Don't have an account? <a href="#">Create one</a> &nbsp;·&nbsp;
      <a href="#">Forgot password?</a>
    </p>

  </div>

  <!-- Signed-In State -->
  <div id="success-screen">
    <div class="avatar-placeholder" id="avatar-wrap">👤</div>
    <div id="success-name">Welcome!</div>
    <div id="success-email"></div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     FIREBASE SETUP  — replace the config below
     ═══════════════════════════════════════════════ -->
<script type="module">
  // ─── 1. Import Firebase SDKs ───────────────────────────────
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithEmailAndPassword,
    signOut as fbSignOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

  // ─── 2. Firebase config ─────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyBHPKZTw-aiqqLRSeH89hxvUxyCHrh4sg4",
    authDomain:        "spicy-masti.firebaseapp.com",
    projectId:         "spicy-masti",
    storageBucket:     "spicy-masti.firebasestorage.app",
    messagingSenderId: "81033567608",
    appId:             "1:81033567608:web:1f492d5199461677ddbc8d",
    measurementId:     "G-M1PSZ2PKR1"
  };

  // ─── 3. Initialize ──────────────────────────────────────────
  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();
  provider.addScope('profile');
  provider.addScope('email');

  // ─── 4. Auth state listener ─────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) showSuccess(user);
    else      showForm();
  });

  // ─── 5. Google Sign-In ──────────────────────────────────────
  window.signInWithGoogle = async () => {
    setLoading(true);
    hideError();
    try {
      await signInWithPopup(auth, provider);
      // onAuthStateChanged handles the rest
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  };

  // ─── 6. Email / Password Sign-In ───────────────────────────
  window.signInWithEmail = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Please fill in both fields.'); return; }
    hideError();
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      showError(friendlyError(err.code));
    }
  };

  // ─── 7. Sign Out ────────────────────────────────────────────
  window.signOut = () => fbSignOut(auth);

  // ─── Helpers ────────────────────────────────────────────────
  function showSuccess(user) {
    document.getElementById('auth-form').style.display    = 'none';
    document.getElementById('success-screen').style.display = 'flex';
    document.getElementById('success-name').textContent  = user.displayName || 'Signed in';
    document.getElementById('success-email').textContent = user.email || '';
    const avatarWrap = document.getElementById('avatar-wrap');
    if (user.photoURL) {
      avatarWrap.innerHTML = `<img class="avatar" src="${user.photoURL}" alt="avatar"/>`;
    }
  }

  function showForm() {
    document.getElementById('auth-form').style.display    = 'block';
    document.getElementById('success-screen').style.display = 'none';
    document.getElementById('avatar-wrap').innerHTML      = '👤';
  }

  function setLoading(on) {
    const btn     = document.getElementById('btn-google');
    const spinner = document.getElementById('google-spinner');
    btn.classList.toggle('loading', on);
    spinner.style.display = on ? 'block' : 'none';
  }

  function showError(msg) {
    const b = document.getElementById('error-banner');
    document.getElementById('error-text').textContent = msg;
    b.className = 'banner error';
  }

  function hideError() {
    document.getElementById('error-banner').className = 'banner';
  }

  function friendlyError(code) {
    const map = {
      'auth/popup-closed-by-user':    'Sign-in popup was closed. Please try again.',
      'auth/cancelled-popup-request': 'Another popup is already open.',
      'auth/popup-blocked':           'Popup blocked — please allow popups for this site.',
      'auth/user-not-found':          'No account found with this email.',
      'auth/wrong-password':          'Incorrect password. Please try again.',
      'auth/invalid-email':           'That doesn\'t look like a valid email.',
      'auth/too-many-requests':       'Too many attempts. Please wait a moment.',
      'auth/network-request-failed':  'Network error. Check your connection.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>

</body>
</html>
